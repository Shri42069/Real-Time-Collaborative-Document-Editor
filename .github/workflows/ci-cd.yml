name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:    docker.io
  IMAGE_BACK:  ${{ secrets.DOCKER_USERNAME }}/collab-editor-backend
  IMAGE_FRONT: ${{ secrets.DOCKER_USERNAME }}/collab-editor-frontend

jobs:
  # ── 1. Test ───────────────────────────────────────────
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: backend
        env:
          NODE_ENV:              test
          JWT_SECRET:            test_secret
          JWT_REFRESH_SECRET:    test_refresh_secret
          MONGO_URI:             mongodb://localhost:27017/collab-editor-test
          REDIS_HOST:            localhost
          REDIS_PORT:            6379
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage

  # ── 2. Build & push Docker images ────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACK }}:latest
            ${{ env.IMAGE_BACK }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONT }}:latest
            ${{ env.IMAGE_FRONT }}:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
            REACT_APP_WS_URL=${{ secrets.REACT_APP_WS_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   docker-compose.yml,nginx/
          target:   ~/collab-editor

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/collab-editor
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}"
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f
            # Health check — wait up to 30s
            for i in $(seq 1 6); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/healthz)
              [ "$STATUS" = "200" ] && echo "Healthy" && exit 0
              echo "Attempt $i — status $STATUS, retrying…"
              sleep 5
            done
            echo "Health check failed" && exit 1
